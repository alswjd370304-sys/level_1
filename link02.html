<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="">
    <meta name="description" content="">
    <title>링크태그</title>
</head>
<body>
    <h1>링크태그</h1>
    <h2>절대경로</h2>
    <p>http://로 시작하는 실제 웹 서비스 주소</p>
    <a href="http://google.com" target="_blank">구글 바로가기</a>
    <a href="http://naver.com" target="_blank">네이버 바로가기</a>
    <a href="http://apple.com" target="_blank">애플바로가기</a>
    <!-- 네이버 쇼핑태그 클론코딩 -->
    <div id="shopping_wrap">
        <!-- 1. 쇼핑제목 탭 -->
        <div class="title_controls_wrap">
            <!-- 좌 -->
            <div class="title">
                <a href="#">쇼핑</a><img src="" alt="">
                <a href="#">맨즈</a><img src="" alt="">
                <a href="#">브랜드샵</a><img src="" alt="">
                <a href="#" class="active">MY추천</a><img src="" alt="">
                <a href="#">추천핫딜</a><img src="" alt="">
                <a href="#">쇼핑라이브</a>
            </div>
            <!-- 우 -->
            <div class="controls">
                <em class="current_page">3</em>
                <span class="total_page">/12</span>
                <a href="#" class="pev_btn"><img src="" alt="이전상품보기"></a>
                <a href="#" class="next_btn"><img src="" alt="다음상품보기"></a>
            </div>
        </div><!--e:title_controls_wrap  -->
        <!-- 2. 쇼핑 내용(광고, 주문, 추천태그, 상품목록) -->
        <div class="container">
            <div class="side_bar">
                <!-- 좌 -->
                <div class="ad">
                    <a href="#" target="_blank"><em>쿠팡</em></a>
                    <a href="#" target="_blank">g마켓</a>
                    <a href="#" target="_blank">옥션</a>
                    <a href="#" target="_blank">11번가</a>
                    <a href="#" target="_blank">올리브영</a>
                    <a href="#" target="_blank">SSG닷컴</a>
                    <a href="#" target="_blank">하프클럽</a>
                    <a href="#" target="_blank"><em>이마트몰</em></a>
                    <a href="#" target="_blank"><em>GS SHOP</em></a>
                    <a href="#" target="_blank">패션플러스</a>
                </div>
                <div class="user_drder_cart">
                    <a href="#" class="order">주문배송<img src="" alt="3"></a>
                    <a href="#" class="cart">장바구니<img src="" alt="1"></a>
                </div>
                <div class="recommend_list">
                    <a href="#" class="active">#가구/인테리어<img src="" alt=""></a>
                    <a href="#">#출산/육아</a>
                    <a href="#">#식품</a>
                    <a href="#">#디지털/가전</a>
                    <a href="#">#스포츠레저/</a>
                    <a href="#">#화장품/미용</a>
                </div>
            </div>
            <div class="right_contents">
                <a href="#" class="product">
                    <p class="photo"><img src="" alt=""></p>
                    <p class="msg"><em>불만족 시 반품가능</em></p>
                    <h2>자누아 경추배게</h2>
                    <div class="review_score_wrap">
                        <p class="score"><img src="" alt="별점"> 4.79</p>
                        <p clas="review">리뷰 225</p>
                    </div>
                </a>
            </div><!-- e:right_contents  -->
        </div><!-- e:container  -->
        <!-- 3. 내용더보기 -->
        <div class="more_wrap">
            <div class="center">
                <a class="prev_btn"><img src="" alt="이전페이지가기"></a>
                <div class="more_page">
                    <em>MY추천</em><span>더보기</span>
                    <em class="current_page">3</em><span class="total_page">/12</span>
                </div>
                <a class="next_btn"><img src="" alt="다음페이지가기"></a>
            </div>
            <a hef="#" class="ad_btn">AD</a>
        </div>
    </div><!-- e: shopping_wrap -->
</body>
</html>
